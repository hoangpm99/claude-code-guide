site_name: Claude Code Guide
site_url: https://sitename.example

nav:
  - Home: 00-index.md
  - What is Claude Code?: 01-what-is-claude-code.md
  - Getting Started: 02-getting-started.md
  - Workflow: 03-workflow.md
  - Requirement Engineering: 04-requirement-engineering.md

theme:
  name: material
  palette:
    # Dark mode — Nittany Navy background, PA Sky accents
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: custom
      accent: custom

    # Light mode — white background, Beaver Blue primary, PA Sky accents
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: custom
      accent: custom

extra_css:
  - stylesheets/extra.css